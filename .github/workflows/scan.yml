name: VisionGuard Vulnerability Scanner

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Target URL (https://example.com)'
        required: true
      scan_type:
        description: 'Scan Type'
        required: true
        default: 'full'
        type: choice
        options:
          - quick
          - full
          - passive

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip
          pip3 install aiohttp rich requests beautifulsoup4

      - name: Run VisionGuard Scanner
        env:
          TARGET_URL: ${{ github.event.inputs.target }}
          SCAN_TYPE: ${{ github.event.inputs.scan_type }}
        run: |
          python3 << 'PYEOF'
          import os, sys, time, json, re
          from datetime import datetime
          from rich.console import Console
          from rich.table import Table
          from rich.live import Live
          from rich.panel import Panel
          from rich.progress import Progress
          import requests
          from urllib.parse import urlparse, parse_qs, urljoin

          console = Console()
          TARGET = os.environ["TARGET_URL"]
          SCAN_TYPE = os.environ["SCAN_TYPE"]
          REPORT_FILE = "vulnerability_report.txt"

          # ===== ۱. پایگاه دانش راه‌حل‌ها =====
          FIXES_DB = {
              "sql_injection": {
                  "severity": "Critical",
                  "description": "SQL Injection vulnerability detected",
                  "owasp": "A03:2021 – Injection",
                  "fix": """🔧 HOW TO FIX SQL INJECTION:
          1. Use Parameterized Queries (Prepared Statements)
          2. Use ORM frameworks (SQLAlchemy, Django ORM)
          3. Implement Input Validation (whitelist approach)
          4. Apply Least Privilege Principle to DB accounts
          5. Use WAF (Web Application Firewall)
          Example (Python):
            cursor.execute("SELECT * FROM users WHERE id = ?", (user_id,))"""
              },
              "xss": {
                  "severity": "High",
                  "description": "Cross-Site Scripting (XSS) vulnerability",
                  "owasp": "A03:2021 – Injection",
                  "fix": """🔧 HOW TO FIX XSS:
          1. Encode output (HTML Entity Encoding)
          2. Use Content-Security-Policy (CSP) header
          3. Implement input validation
          4. Use frameworks with auto-escaping (React, Angular)
          5. Set HttpOnly & Secure flags on cookies
          Example (Python Flask):
            {{ user_input|e }}  <!-- auto-escape in Jinja2 -->"""
              },
              "csrf": {
                  "severity": "High",
                  "description": "Cross-Site Request Forgery vulnerability",
                  "owasp": "A01:2021 – Broken Access Control",
                  "fix": """🔧 HOW TO FIX CSRF:
          1. Implement CSRF Tokens in all forms
          2. Use SameSite Cookie Attribute (Strict/Lax)
          3. Verify Origin/Referer headers
          4. Require re-authentication for sensitive actions
          Example (Python Flask):
            from flask_wtf.csrf import CSRFProtect
            csrf = CSRFProtect(app)"""
              },
              "missing_security_headers": {
                  "severity": "Medium",
                  "description": "Missing HTTP Security Headers",
                  "owasp": "A05:2021 – Security Misconfiguration",
                  "fix": """🔧 HOW TO FIX MISSING SECURITY HEADERS:
          1. Add HSTS header: Strict-Transport-Security
          2. Add X-Content-Type-Options: nosniff
          3. Add X-Frame-Options: DENY or SAMEORIGIN
          4. Add Content-Security-Policy header
          5. Add Referrer-Policy header"""
              },
              "open_redirect": {
                  "severity": "Medium",
                  "description": "Open Redirect vulnerability",
                  "owasp": "A01:2021 – Broken Access Control",
                  "fix": """🔧 HOW TO FIX OPEN REDIRECT:
          1. Avoid user-controlled redirect URLs
          2. Use a whitelist of allowed redirect URLs
          3. Use relative paths instead of absolute URLs
          4. Implement redirect validation with URL parsing"""
              },
              "sensitive_info": {
                  "severity": "Low",
                  "description": "Sensitive Information Exposure",
                  "owasp": "A04:2021 – Insecure Design",
                  "fix": """🔧 HOW TO FIX SENSITIVE INFO EXPOSURE:
          1. Remove debug/error pages in production
          2. Disable server signature (Server header)
          3. Mask/remove sensitive data from responses
          4. Implement proper error handling"""
              }
          }

          # ===== ۲. اسکنر =====
          class VisionGuardScanner:
              def __init__(self, target_url):
                  self.target = target_url.rstrip('/')
                  self.parsed = urlparse(self.target)
                  self.base = f"{self.parsed.scheme}://{self.parsed.netloc}"
                  self.findings = []
                  self.session = requests.Session()
                  self.session.headers.update({
                      "User-Agent": "VisionGuard/1.0 (Security Scanner - Authorized Testing Only)"
                  })

              def check_security_headers(self):
                  """Check for missing security headers"""
                  try:
                      resp = self.session.get(self.target, timeout=10, allow_redirects=True)
                      headers = resp.headers
                      checks = {
                          "Strict-Transport-Security": "HSTS not enforced",
                          "X-Content-Type-Options": "Missing X-Content-Type-Options",
                          "X-Frame-Options": "Missing clickjacking protection",
                          "Content-Security-Policy": "Missing CSP header",
                          "Referrer-Policy": "Missing Referrer-Policy"
                      }
                      for header, issue in checks.items():
                          if header not in headers:
                              self.findings.append({
                                  "type": "missing_security_headers",
                                  "url": self.target,
                                  "detail": f"Missing header: {header} ({issue})",
                                  "evidence": f"Response headers: {dict(headers)}"
                              })
                  except Exception as e:
                      console.print(f"[red]✗ Failed to check headers: {e}[/red]")

              def check_sqli(self):
                  """Quick SQLi check on query parameters"""
                  test_payloads = ["'", "\"", "1 OR 1=1", "' OR '1'='1"]
                  try:
                      resp = self.session.get(self.target, timeout=10)
                      if '?' in self.target:
                          base_url = self.target.split('?')[0]
                          params = parse_qs(urlparse(self.target).query)
                          for param in params:
                              for payload in test_payloads[:2]:  # Quick check only
                                  test_params = params.copy()
                                  test_params[param] = [payload]
                                  test_resp = self.session.get(base_url, params=test_params, timeout=10)
                                  for error in ['sql', 'mysql', 'syntax', 'database', 'ORA-', 'SQLite']:
                                      if error.lower() in test_resp.text.lower():
                                          self.findings.append({
                                              "type": "sql_injection",
                                              "url": self.target,
                                              "detail": f"Potential SQLi in parameter '{param}'",
                                              "evidence": f"Payload: {payload} → SQL error detected"
                                          })
                                          break
                  except:
                      pass

              def check_xss(self):
                  """Quick XSS check on reflected params"""
                  test_payload = "<script>alert('XSS')</script>"
                  try:
                      resp = self.session.get(self.target, timeout=10)
                      if '?' in self.target:
                          base_url = self.target.split('?')[0]
                          params = parse_qs(urlparse(self.target).query)
                          for param in params:
                              test_resp = self.session.get(f"{base_url}?{param}={test_payload}", timeout=10)
                              if test_payload in test_resp.text:
                                  self.findings.append({
                                      "type": "xss",
                                      "url": self.target,
                                      "detail": f"Reflected XSS in parameter '{param}'",
                                      "evidence": f"Payload reflected in response"
                                  })
                  except:
                      pass

              def check_open_redirect(self):
                  """Check for open redirect"""
                  test_urls = ["https://evil.com", "//evil.com", "https:evil.com"]
                  try:
                      resp = self.session.get(self.target, timeout=10)
                      if '?' in self.target:
                          base_url = self.target.split('?')[0]
                          params = parse_qs(urlparse(self.target).query)
                          redirect_params = ['redirect', 'url', 'next', 'return', 'goto', 'callback', 'target']
                          for param in redirect_params:
                              for test_url in test_urls:
                                  test_resp = self.session.get(f"{base_url}?{param}={test_url}", 
                                                              timeout=10, allow_redirects=False)
                                  if test_resp.status_code in (301, 302, 303, 307, 308):
                                      location = test_resp.headers.get('Location', '')
                                      if 'evil.com' in location:
                                          self.findings.append({
                                              "type": "open_redirect",
                                              "url": self.target,
                                              "detail": f"Open Redirect in parameter '{param}'",
                                              "evidence": f"Redirected to: {location}"
                                          })
                  except:
                      pass

              def check_sensitive_info(self):
                  """Check for exposed sensitive info"""
                  sensitive_patterns = {
                      r'password\s*=\s*["\'][^"\']+["\']': 'Hardcoded password',
                      r'API[_\s]?KEY\s*=\s*["\'][^"\']+["\']': 'Exposed API key',
                      r'BEGIN RSA PRIVATE KEY': 'Private key exposed',
                  }
                  try:
                      resp = self.session.get(self.target, timeout=10)
                      for pattern, desc in sensitive_patterns.items():
                          if re.search(pattern, resp.text, re.IGNORECASE):
                              self.findings.append({
                                  "type": "sensitive_info",
                                  "url": self.target,
                                  "detail": f"Sensitive data: {desc}",
                                  "evidence": f"Pattern matched in response body"
                              })
                  except:
                      pass

              def run_full_scan(self):
                  console.print(f"\n[bold cyan]🔍 VisionGuard scanning: {self.target}[/bold cyan]\n")
                  with Progress() as progress:
                      task = progress.add_task("[cyan]Scanning...", total=6)
                      
                      self.check_security_headers()
                      progress.update(task, advance=1, description="[green]✓ Security Headers")
                      
                      self.check_sqli()
                      progress.update(task, advance=1, description="[green]✓ SQL Injection")
                      
                      self.check_xss()
                      progress.update(task, advance=1, description="[green]✓ XSS")
                      
                      self.check_open_redirect()
                      progress.update(task, advance=1, description="[green]✓ Open Redirect")
                      
                      self.check_sensitive_info()
                      progress.update(task, advance=1, description="[green]✓ Sensitive Info")
                      
                      progress.update(task, advance=1, description="[bold green]✅ Scan Complete!")

              def generate_report(self):
                  """Generate and display findings with fixes"""
                  console.print("\n")
                  
                  if not self.findings:
                      console.print(Panel.fit(
                          "[bold green]✅ No vulnerabilities found![/bold green]\n"
                          "The target appears to be secure against common attacks.",
                          title="Scan Result", border_style="green"
                      ))
                  else:
                      table = Table(title="🛡️ Vulnerability Report", show_header=True,
                                   header_style="bold white")
                      table.add_column("#", style="dim")
                      table.add_column("Type", style="cyan")
                      table.add_column("Severity")
                      table.add_column("Detail")
                      table.add_column("Fix Available")

                      for i, f in enumerate(self.findings, 1):
                          fix_info = FIXES_DB.get(f['type'], {})
                          severity = fix_info.get('severity', 'Unknown')
                          severity_color = {
                              "Critical": "red", "High": "red", "Medium": "yellow", "Low": "green"
                          }.get(severity, "white")
                          table.add_row(
                              str(i),
                              f['type'].replace('_', ' ').title(),
                              f"[{severity_color}]{severity}[/{severity_color}]",
                              f['detail'][:60],
                              "✅ Yes" if fix_info else "❌ No"
                          )
                      console.print(table)

                      # نمایش راه‌حل‌ها
                      console.print("\n[bold yellow]🔧 REMEDIATION GUIDE[/bold yellow]")
                      for i, f in enumerate(self.findings, 1):
                          fix_info = FIXES_DB.get(f['type'])
                          if fix_info:
                              console.print(f"\n[bold cyan]━━━ #{i}: {f['type'].replace('_',' ').title()} ({fix_info['severity']})[/bold cyan]")
                              console.print(f"[dim]OWASP: {fix_info['owasp']}[/dim]")
                              console.print(f"[green]{fix_info['fix']}[/green]")

                  # ذخیره گزارش
                  with open(REPORT_FILE, 'w') as rf:
                      rf.write(f"VisionGuard Vulnerability Report\n")
                      rf.write(f"Target: {TARGET}\n")
                      rf.write(f"Date: {datetime.now().strftime('%Y-%m-%d %H:%M:%S')}\n")
                      rf.write(f"Findings: {len(self.findings)}\n")
                      rf.write("="*50 + "\n")
                      for f in self.findings:
                          fix = FIXES_DB.get(f['type'], {})
                          rf.write(f"\nType: {f['type']}\n")
                          rf.write(f"Severity: {fix.get('severity','Unknown')}\n")
                          rf.write(f"Detail: {f['detail']}\n")
                          rf.write(f"Evidence: {f['evidence']}\n")
                          rf.write(f"Fix:\n{fix.get('fix','No fix available')}\n")
                          rf.write("-"*40 + "\n")

                  os.system(f"git add {REPORT_FILE} && git commit -m 'Vulnerability scan report for {TARGET}' && git push 2>/dev/null || true")
                  console.print(f"\n[green]📄 Full report saved to {REPORT_FILE}[/green]")

          scanner = VisionGuardScanner(TARGET)
          
          if SCAN_TYPE == 'quick':
              scanner.check_security_headers()
              scanner.check_sqli()
          elif SCAN_TYPE == 'full':
              scanner.run_full_scan()
          elif SCAN_TYPE == 'passive':
              scanner.check_security_headers()
              scanner.check_sensitive_info()

          scanner.generate_report()
          console.print("\n[bold green]✅ VisionGuard scan completed![/bold green]")
          PYEOF
