name: VisionGuard Ultra (Full Automatic Mode)

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'دامنهٔ هدف (example.com)'
        required: true

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 📦 کش Nuclei Templates
        uses: actions/cache@v4
        with:
          path: ~/nuclei-templates
          key: nuclei-ultra-${{ runner.os }}-1

      - name: 🔧 نصب تمام ابزارها
        run: |
          sudo apt-get update
          sudo apt-get install -y nmap nikto python3-pip git golang-go
          pip3 install rich requests beautifulsoup4 lxml playwright
          playwright install --with-deps firefox

          # Subfinder
          curl -L https://github.com/projectdiscovery/subfinder/releases/download/v2.6.6/subfinder_2.6.6_linux_amd64.zip -o subfinder.zip
          unzip -o subfinder.zip -d /tmp && sudo mv /tmp/subfinder /usr/local/bin/ && rm subfinder.zip

          # Httpx
          curl -L https://github.com/projectdiscovery/httpx/releases/download/v1.6.0/httpx_1.6.0_linux_amd64.zip -o httpx.zip
          unzip -o httpx.zip -d /tmp && sudo mv /tmp/httpx /usr/local/bin/ && rm httpx.zip

          # Nuclei
          curl -L https://github.com/projectdiscovery/nuclei/releases/download/v3.2.0/nuclei_3.2.0_linux_amd64.zip -o nuclei.zip
          unzip -o nuclei.zip -d /tmp && sudo mv /tmp/nuclei /usr/local/bin/ && rm nuclei.zip

          if [ ! -d ~/nuclei-templates ]; then
            nuclei -ut -ud ~/nuclei-templates
          fi

          # sqlmap
          git clone --depth 1 https://github.com/sqlmapproject/sqlmap.git /tmp/sqlmap

          # ffuf
          go install github.com/ffuf/ffuf/v2@latest
          sudo cp ~/go/bin/ffuf /usr/local/bin/

      - name: 🚀 اجرای اسکن کامل (Quick + Deep + Full)
        env:
          TARGET_DOMAIN: ${{ github.event.inputs.target }}
        run: |
          python3 << 'PYEOF'
          import os, sys, time, json, re, subprocess
          from datetime import datetime
          from urllib.parse import urlparse
          from rich.console import Console
          from rich.table import Table
          from rich.panel import Panel
          import requests
          from playwright.sync_api import sync_playwright

          console = Console()
          TARGET = os.environ["TARGET_DOMAIN"].strip().rstrip('/')
          REPORT_FILE = "vulnerability_report.txt"
          TEMPLATES_DIR = os.path.expanduser("~/nuclei-templates")

          if TARGET.startswith('http'):
              TARGET = urlparse(TARGET).netloc

          FINDINGS = []
          LIVE_URLS = []
          ALL_SUBDOMAINS = []

          FIXES = {
              "sqli": {"severity":"بحرانی","owasp":"A03:2021","desc":"تزریق SQL","fix":"۱. استفاده از کوئری‌های پارامتری\n۲. ORM\n۳. اعتبارسنجی ورودی\n۴. کمترین دسترسی\n۵. WAF"},
              "xss": {"severity":"بالا","owasp":"A03:2021","desc":"XSS","fix":"۱. کدگذاری خروجی\n۲. CSP\n۳. فریم‌ورک خودفرار\n۴. HttpOnly"},
              "dom_xss": {"severity":"بالا","owasp":"A03:2021","desc":"DOM XSS","fix":"۱. sanitize کردن innerHTML\n۲. استفاده از textContent\n۳. CSP"},
              "ssrf": {"severity":"بحرانی","owasp":"A10:2021","desc":"SSRF","fix":"۱. لیست سفید URL\n۲. مسدودسازی IP داخلی"},
              "ssti": {"severity":"بحرانی","owasp":"A03:2021","desc":"SSTI","fix":"۱. ممنوعیت ورودی کاربر در قالب\n۲. سندباکس"},
              "idor": {"severity":"بالا","owasp":"A01:2021","desc":"IDOR","fix":"۱. UUID\n۲. بررسی مالکیت"},
              "rce": {"severity":"بحرانی","owasp":"A03:2021","desc":"RCE","fix":"۱. eval ممنوع\n۲. غیرفعال‌سازی توابع خطرناک"},
              "exposed_env": {"severity":"بحرانی","owasp":"A05:2021","desc":".env در دسترس","fix":"۱. مسدودسازی dotfiles\n۲. Vault"},
              "exposed_git": {"severity":"بالا","owasp":"A05:2021","desc":".git در دسترس","fix":"۱. مسدودسازی .git\n۲. CI/CD"},
              "exposed_config": {"severity":"بالا","owasp":"A05:2021","desc":"پیکربندی در دسترس","fix":"۱. انتقال به خارج webroot"},
              "open_redirect": {"severity":"متوسط","owasp":"A01:2021","desc":"تغییر مسیر باز","fix":"۱. لیست سفید\n۲. مسیر نسبی"},
              "missing_headers": {"severity":"متوسط","owasp":"A05:2021","desc":"فقدان هدر امنیتی","fix":"افزودن HSTS, CSP, X-Frame,..."},
              "cors_misconfig": {"severity":"متوسط","owasp":"A05:2021","desc":"CORS نادرست","fix":"۱. عدم استفاده از *\n۲. اعتبارسنجی Origin"},
              "cve": {"severity":"بحرانی","owasp":"A06:2021","desc":"CVE شناخته‌شده","fix":"به‌روزرسانی به نسخهٔ ترمیم‌شده"},
              "backup_file": {"severity":"متوسط","owasp":"A05:2021","desc":"فایل پشتیبان","fix":"انتقال به خارج webroot"},
          }

          def add_finding(ftype, detail, evidence="", url=""):
              FINDINGS.append({"type":ftype, "detail":detail, "evidence":str(evidence)[:200], "url":url or TARGET})

          console.print(Panel.fit("[bold yellow]🕵️ فاز ۱: شناسایی (Quick Mode)[/bold yellow]", border_style="yellow"))

          # --- Subfinder ---
          try:
              result = subprocess.run(["subfinder", "-d", TARGET, "-silent", "-timeout", "30"],
                                      capture_output=True, text=True, timeout=60)
              ALL_SUBDOMAINS = [s.strip() for s in result.stdout.splitlines() if s.strip()]
              console.print(f"[green]✓ {len(ALL_SUBDOMAINS)} زیردامنه[/green]")
          except:
              ALL_SUBDOMAINS = [TARGET]

          # --- Nmap ---
          try:
              result = subprocess.run(["nmap", "-sT", "-sV", "-p", "1-10000", "--min-rate", "5000", TARGET],
                                      capture_output=True, text=True, timeout=120)
              for line in result.stdout.splitlines():
                  if "/tcp" in line and "open" in line:
                      add_finding("port_open", f"پورت باز: {line.strip()}", line.strip())
          except: pass

          # --- Httpx ---
          all_targets = [TARGET] + ALL_SUBDOMAINS[:30]
          try:
              with open("/tmp/targets.txt","w") as f: f.write("\n".join(all_targets))
              result = subprocess.run(["httpx", "-l", "/tmp/targets.txt", "-silent", "-status-code", "-title"],
                                      capture_output=True, text=True, timeout=60)
              for line in result.stdout.splitlines():
                  if line.startswith("http"):
                      LIVE_URLS.append(line.split()[0])
              console.print(f"[green]✓ {len(LIVE_URLS)} آدرس زنده[/green]")
          except:
              LIVE_URLS = [f"https://{TARGET}"]

          console.print(Panel.fit("[bold yellow]⚡ فاز ۲: اسکن خودکار (Deep Mode)[/bold yellow]", border_style="yellow"))

          if LIVE_URLS:
              url_file = "/tmp/live_urls.txt"
              with open(url_file,"w") as f: f.write("\n".join(LIVE_URLS[:10]))
              try:
                  result = subprocess.run(["nuclei", "-l", url_file, "-t", TEMPLATES_DIR, "-severity", "critical,high,medium", "-timeout", "10", "-silent", "-json"],
                                          capture_output=True, text=True, timeout=300)
                  for line in result.stdout.splitlines():
                      try:
                          ndata = json.loads(line)
                          template = ndata.get("template-id","")
                          desc = ndata.get("info",{}).get("description","")
                          matched = ndata.get("matched-at","")
                          fix_map = {"sql":"sqli","xss":"xss","ssrf":"ssrf","ssti":"ssti","idor":"idor","rce":"rce","env":"exposed_env","git":"exposed_git","config":"exposed_config","cve":"cve","cors":"cors_misconfig","backup":"backup_file"}
                          ftype = "missing_headers"
                          for k,v in fix_map.items():
                              if k in template.lower(): ftype = v; break
                          add_finding(ftype, f"[Nuclei] {desc}", f"قالب: {template}", matched)
                      except: pass
              except: pass

          console.print(Panel.fit("[bold yellow]🔍 فاز ۳: تست‌های پیشرفته (Full Mode)[/bold yellow]", border_style="yellow"))

          session = requests.Session()
          session.headers.update({"User-Agent": "VisionGuard/3.0"})

          # SQLMap on each live URL
          for url in LIVE_URLS[:3]:
              console.print(f"[cyan]← sqlmap روی {url}...[/cyan]")
              try:
                  result = subprocess.run(["python3", "/tmp/sqlmap/sqlmap.py", "-u", url, "--batch", "--random-agent", "--level=2", "--risk=2", "--timeout=10", "--output-dir=/tmp/sqlmap_output"],
                                          capture_output=True, text=True, timeout=120)
                  if "is vulnerable" in result.stdout.lower() or "parameter" in result.stdout.lower():
                      for line in result.stdout.splitlines():
                          if "Parameter" in line and "is vulnerable" in line:
                              add_finding("sqli", f"[sqlmap] {line.strip()}", line.strip(), url)
              except: pass

          # Playwright for DOM XSS
          console.print("[cyan]← Playwright: بررسی DOM XSS...[/cyan]")
          try:
              with sync_playwright() as p:
                  browser = p.firefox.launch(headless=True)
                  page = browser.new_page()
                  for url in LIVE_URLS[:3]:
                      try:
                          page.goto(url, wait_until="domcontentloaded", timeout=15000)
                          payloads = ["<img src=x onerror=alert(1)>", "\"><svg onload=alert(1)>"]
                          for payload in payloads:
                              page.evaluate(f"document.body.innerHTML += '{payload}'")
                              time.sleep(0.5)
                              dialog = page.evaluate("() => window.alertCalled")
                              if dialog:
                                  add_finding("dom_xss", f"DOM XSS در {url}", payload, url)
                      except: pass
                  browser.close()
          except: pass

          # XSS reflected and SQLi time-based
          for url in LIVE_URLS[:5]:
              parsed = urlparse(url)
              if parsed.query:
                  params = [p.split('=')[0] for p in parsed.query.split('&') if '=' in p]
                  for p in params:
                      for payload in ["<script>alert(1)</script>", "<img src=x onerror=alert(1)>"]:
                          try:
                              test_url = f"{parsed.scheme}://{parsed.netloc}{parsed.path}?{p}={payload}"
                              if payload in session.get(test_url, timeout=10).text:
                                  add_finding("xss", f"XSS بازتابی در '{p}'", payload, url)
                          except: pass
                  for p in params:
                      for payload in [f"{p}=1' AND SLEEP(5)--"]:
                          try:
                              test_url = f"{parsed.scheme}://{parsed.netloc}{parsed.path}?{payload}"
                              start = time.time()
                              session.get(test_url, timeout=15)
                              if time.time() - start > 4.5:
                                  add_finding("sqli", f"SQLi زمان‌محور در '{p}'", f"تأخیر {time.time()-start:.1f}s", url)
                          except: pass

          # فایل‌های حساس با ffuf
          console.print("[cyan]← ffuf: جستجوی فایل‌های حساس...[/cyan]")
          wordlist = "/tmp/sensitive.txt"
          with open(wordlist,"w") as f:
              f.write(".env\n.git/HEAD\nconfig.json\nwp-config.php.bak\nbackup.zip\n.aws/credentials\nid_rsa\n")
          for url in LIVE_URLS[:3]:
              try:
                  result = subprocess.run(["ffuf", "-u", f"{url.rstrip('/')}/FUZZ", "-w", wordlist, "-mc", "200", "-timeout", "5", "-t", "10"],
                                          capture_output=True, text=True, timeout=60)
                  for line in result.stdout.splitlines():
                      if "200" in line and "FUZZ" not in line:
                          path = line.split()[0]
                          if ".env" in path: add_finding("exposed_env", f"فایل .env در {url}{path}", "", url)
                          elif ".git" in path: add_finding("exposed_git", f".git در {url}{path}", "", url)
                          elif "backup" in path: add_finding("backup_file", f"پشتیبان در {url}{path}", "", url)
                          else: add_finding("exposed_config", f"پیکربندی در {url}{path}", "", url)
              except: pass

          console.print(Panel.fit("[bold yellow]📊 گزارش نهایی (هر سه فاز)[/bold yellow]", border_style="yellow"))
          if not FINDINGS:
              console.print(Panel.fit("[bold green]✅ هیچ آسیب‌پذیری پیدا نشد![/bold green]", title="نتیجه", border_style="green"))
          else:
              tbl = Table(title=f"🛡️ گزارش VisionGuard Ultra – {TARGET}", show_header=True, header_style="bold white")
              tbl.add_column("#", style="dim")
              tbl.add_column("نوع", style="cyan")
              tbl.add_column("شدت")
              tbl.add_column("جزئیات")
              tbl.add_column("URL")
              for i, f in enumerate(FINDINGS, 1):
                  fix = FIXES.get(f['type'], {})
                  sev = fix.get('severity', 'نامشخص')
                  sev_color = "red" if sev in ("بحرانی","بالا") else "yellow" if sev == "متوسط" else "green"
                  tbl.add_row(str(i), f['type'].replace('_',' ').title(), f"[{sev_color}]{sev}[/{sev_color}]", f['detail'][:70], f.get('url', TARGET)[:50])
              console.print(tbl)

              console.print("\n[bold yellow]🔧 راهنمای رفع[/bold yellow]")
              shown = set()
              for i, f in enumerate(FINDINGS, 1):
                  fix = FIXES.get(f['type'])
                  if fix and f['type'] not in shown:
                      shown.add(f['type'])
                      console.print(f"\n[bold cyan]━━━ {fix['desc']} ({fix['severity']})[/bold cyan]")
                      console.print(f"[dim]OWASP: {fix['owasp']}[/dim]")
                      console.print(f"[green]{fix['fix']}[/green]")

              with open(REPORT_FILE, 'w', encoding='utf-8') as rf:
                  rf.write(f"گزارش VisionGuard Ultra\nهدف: {TARGET}\nتاریخ: {datetime.now().strftime('%Y-%m-%d %H:%M:%S')}\nتعداد یافته‌ها: {len(FINDINGS)}\n")
                  rf.write("="*60 + "\n")
                  for i, f in enumerate(FINDINGS, 1):
                      fix = FIXES.get(f['type'], {})
                      rf.write(f"\n#{i}: {fix.get('desc','نامشخص')}\nنوع: {f['type']}\nشدت: {fix.get('severity','نامشخص')}\nجزئیات: {f['detail']}\nمدرک: {f['evidence']}\nURL: {f.get('url', TARGET)}\nراه‌حل:\n{fix.get('fix','بدون راه‌حل')}\n---\n")
              os.system(f"git add {REPORT_FILE} && git commit -m 'اسکن VisionGuard Ultra: {TARGET}' && git push 2>/dev/null || true")
              console.print(f"\n[green]📄 گزارش در {REPORT_FILE} ذخیره شد[/green]")
          console.print("\n[bold green]✅ اسکن VisionGuard Ultra پایان یافت![/bold green]")
          PYEOF
